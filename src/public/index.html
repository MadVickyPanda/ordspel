<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Wordle</title>

  <style>
    body {
      margin: 0;
      background: #121213;
      color: white;
      font-family: Arial;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 30px;
    }

    .nav {
      margin-bottom: 15px;
    }

    button {
      padding: 8px 12px;
      margin: 3px;
      background: #1f1f1f;
      border: 1px solid #333;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2a2a2a;
    }

    .row {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }

    .cell {
      width: 52px;
      height: 52px;
      border: 2px solid #3a3a3c;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
      text-transform: uppercase;
    }

    input, select {
      padding: 8px;
      background: #121213;
      border: 2px solid #3a3a3c;
      color: white;
      text-align: center;
      margin-top: 10px;
    }

    .inputRow {
      margin-top: 15px;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- App -->
  <script src="/app.js"></script>
</body>
</html>
